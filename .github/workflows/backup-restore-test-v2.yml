name: Weekly Backup Restore Test

on:
  schedule:
    # Jeden Montag um 03:00 UTC (05:00 MESZ)
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  restore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: restore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Install rclone + PostgreSQL 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          curl -sSL https://rclone.org/install.sh | sudo bash -s beta 2>/dev/null

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          no_check_bucket = true
          EOF

      - name: Find latest backup in R2
        id: latest
        run: |
          LATEST=$(rclone lsf "r2:${{ secrets.R2_BUCKET }}" --dirs-only | sort -r | head -1 | tr -d '/')
          echo "LATEST=$LATEST" >> $GITHUB_OUTPUT
          echo "📦 Neuestes Backup: $LATEST"
          if [ -z "$LATEST" ]; then
            echo "❌ Kein Backup in R2 gefunden!" && exit 1
          fi

      - name: Download backup.dump from R2
        run: |
          LATEST=${{ steps.latest.outputs.LATEST }}
          rclone copyto "r2:${{ secrets.R2_BUCKET }}/$LATEST/backup.dump" backup.dump
          echo "✅ Downloaded: $(du -sh backup.dump | cut -f1)"

      - name: Restore backup into test DB (pg_restore)
        env:
          PGPASSWORD: testpassword
        run: |
          /usr/lib/postgresql/17/bin/pg_restore \
            -h localhost -U postgres -d restore_test \
            --no-owner --no-privileges \
            --disable-triggers \
            backup.dump
          echo "✅ Restore abgeschlossen"

      - name: Verify row counts + collect sample data
        env:
          PGPASSWORD: testpassword
          PGSSLMODE: require
        run: |
          echo "=== Zeilenzahlen: Backup vs. Live ==="
          TABLES="users appointments tenants lessons"
          REPORT_ROWS=""
          for TABLE in $TABLES; do
            RESTORED=$(/usr/lib/postgresql/17/bin/psql -h localhost -U postgres -d restore_test -t -c "SELECT COUNT(*) FROM $TABLE;" 2>/dev/null | tr -d ' \n')
            LIVE=$(/usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL }}" 2>/dev/null || true)
            LIVE=$(/usr/lib/postgresql/17/bin/psql "${{ secrets.SUPABASE_DB_URL }}" -t -c "SELECT COUNT(*) FROM $TABLE;" 2>/dev/null | tr -d ' \n')
            echo "  $TABLE: backup=$RESTORED live=$LIVE"
            if [ -n "$REPORT_ROWS" ]; then REPORT_ROWS="$REPORT_ROWS,"; fi
            REPORT_ROWS="$REPORT_ROWS{\"table\":\"$TABLE\",\"backup\":\"$RESTORED\",\"live\":\"$LIVE\"}"
          done

          # Stichproben: nicht-sensitive Felder
          echo "=== Stichproben aus Backup ==="

          USERS_SAMPLE=$(/usr/lib/postgresql/17/bin/psql -h localhost -U postgres -d restore_test -t -A -F'|' \
            -c "SELECT id, first_name, last_name, role, created_at FROM users ORDER BY created_at DESC LIMIT 5;" 2>/dev/null | \
            python3 -c "
import sys, json
rows = []
for line in sys.stdin:
    line = line.strip()
    if not line: continue
    parts = line.split('|')
    if len(parts) >= 5:
        rows.append({'id': parts[0], 'name': parts[1]+' '+parts[2], 'role': parts[3], 'created_at': parts[4]})
print(json.dumps(rows))
")

          TENANTS_SAMPLE=$(/usr/lib/postgresql/17/bin/psql -h localhost -U postgres -d restore_test -t -A -F'|' \
            -c "SELECT id, name, slug, created_at FROM tenants ORDER BY created_at DESC LIMIT 5;" 2>/dev/null | \
            python3 -c "
import sys, json
rows = []
for line in sys.stdin:
    line = line.strip()
    if not line: continue
    parts = line.split('|')
    if len(parts) >= 4:
        rows.append({'id': parts[0], 'name': parts[1], 'slug': parts[2], 'created_at': parts[3]})
print(json.dumps(rows))
")

          APPOINTMENTS_SAMPLE=$(/usr/lib/postgresql/17/bin/psql -h localhost -U postgres -d restore_test -t -A -F'|' \
            -c "SELECT id, start_time, end_time, status FROM appointments ORDER BY start_time DESC LIMIT 5;" 2>/dev/null | \
            python3 -c "
import sys, json
rows = []
for line in sys.stdin:
    line = line.strip()
    if not line: continue
    parts = line.split('|')
    if len(parts) >= 4:
        rows.append({'id': parts[0], 'start_time': parts[1], 'end_time': parts[2], 'status': parts[3]})
print(json.dumps(rows))
")

          DUMP_SIZE=$(du -sb backup.dump | cut -f1)
          LATEST=${{ steps.latest.outputs.LATEST }}

          python3 -c "
import json
report = {
    'backupDate': '$LATEST',
    'testedAt': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
    'dumpBytes': $DUMP_SIZE,
    'rows': $REPORT_ROWS,
    'samples': {
        'users': $USERS_SAMPLE,
        'tenants': $TENANTS_SAMPLE,
        'appointments': $APPOINTMENTS_SAMPLE
    },
    'status': 'success'
}
print(json.dumps(report, indent=2))
" > restore-report.json

          echo "✅ Report erstellt"
          cat restore-report.json | python3 -c "import sys,json; r=json.load(sys.stdin); print('Rows:', [(x['table'], x['backup']) for x in r['rows']])"

      - name: Upload restore report to R2
        run: |
          rclone copyto restore-report.json "r2:${{ secrets.R2_BUCKET }}/restore-report.json"
          echo "✅ Report auf R2 hochgeladen"

      - name: Summary
        run: |
          LATEST=${{ steps.latest.outputs.LATEST }}
          echo "🎉 Restore-Test erfolgreich!"
          echo "   Backup-Datum: $LATEST"
          echo "   Dump-Datei:   $(du -sh backup.dump | cut -f1)"
          echo "   Test-DB:      postgres:17 lokal"
          echo "✅ Backup ist wiederherstellbar!"

      - name: Email – Restore erfolgreich
        if: success()
        run: |
          LATEST=${{ steps.latest.outputs.LATEST }}
          DUMP_SIZE=$(du -sh backup.dump | cut -f1)
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Backup System <noreply@simy.ch>\",
              \"to\": [\"info@simy.ch\"],
              \"subject\": \"✅ Backup Restore-Test erfolgreich – $LATEST\",
              \"html\": \"<h2>✅ Wöchentlicher Backup-Test bestanden</h2><p>Das Backup vom <strong>$LATEST</strong> wurde erfolgreich via <code>pg_restore</code> in einer PostgreSQL 17 Testdatenbank wiederhergestellt.</p><ul><li>Backup-Datei: $DUMP_SIZE</li><li>Format: custom (komprimiert)</li><li>Tabellen geprüft: users, appointments, tenants, lessons</li></ul><p><a href='https://github.com/Kilchi555/driving-team-app/actions/workflows/backup-restore-test.yml'>Details auf GitHub →</a></p>\"
            }"

      - name: Email – Restore fehlgeschlagen
        if: failure()
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Backup System <noreply@simy.ch>\",
              \"to\": [\"info@simy.ch\"],
              \"subject\": \"🚨 ALARM: Backup Restore-Test fehlgeschlagen!\",
              \"html\": \"<h2>🚨 Backup Restore-Test FEHLGESCHLAGEN</h2><p>Der wöchentliche Restore-Test ist heute Nacht fehlgeschlagen. Das Backup ist möglicherweise <strong>nicht wiederherstellbar</strong>.</p><p><strong>Sofortmassnahme:</strong> Backup manuell prüfen und testen.</p><p><a href='https://github.com/Kilchi555/driving-team-app/actions/workflows/backup-restore-test.yml'>Logs auf GitHub →</a></p><p><a href='https://dash.cloudflare.com'>Cloudflare R2 →</a></p>\"
            }"
