name: Build White-Label Android App

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client ID (folder name in clients/)'
        required: true
        default: 'driving-team'
      track:
        description: 'Play Store track'
        required: false
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]

  push:
    tags: ['v*']

jobs:
  setup:
    name: Resolve client list
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.resolve.outputs.clients }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve clients to build
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "clients=[\"${{ github.event.inputs.client }}\"]" >> "$GITHUB_OUTPUT"
          else
            CLIENTS=$(find clients -name config.json \
              | xargs -I{} node -e "
                const c = require('{}');
                if (c.tier === 'whitelabel') process.stdout.write(JSON.stringify(c.clientId) + '\n');
              " | jq -Rs 'split("\n") | map(select(length > 0))' )
            echo "clients=$CLIENTS" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    name: Android — ${{ matrix.client }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: ${{ fromJson(needs.setup.outputs.clients) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Load client config
        id: config
        run: |
          CONFIG="clients/${{ matrix.client }}/config.json"
          echo "bundle_id=$(node -e "console.log(require('./$CONFIG').bundleId)")" >> "$GITHUB_OUTPUT"
          echo "app_name=$(node -e "console.log(require('./$CONFIG').appName)")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -e "console.log(require('./$CONFIG').version)")" >> "$GITHUB_OUTPUT"
          echo "keystore_alias=$(node -e "console.log(require('./$CONFIG').android.keystoreAlias)")" >> "$GITHUB_OUTPUT"

      - name: Install npm dependencies
        run: npm ci

      - name: Nuxt static build
        env:
          CLIENT: ${{ matrix.client }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NODE_ENV: production
        run: npx nuxt generate

      - name: Add Android platform (if not present)
        run: |
          CLIENT="${{ matrix.client }}" npx cap add android 2>/dev/null || true
          CLIENT="${{ matrix.client }}" npx cap sync android

      - name: Generate app icons
        env:
          CLIENT: ${{ matrix.client }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npm install -D sharp --no-save
          node scripts/generate-icons.mjs

      # KEYSTORES_JSON secret format:
      # { "simy": { "b64": "<base64>", "pass": "<password>" }, "driving-team": { ... } }
      - name: Setup keystore
        id: keystore
        env:
          GH_TOKEN: ${{ secrets.SIMY_GITHUB_PAT }}
          CLIENT_ID: ${{ matrix.client }}
          KEYSTORE_ALIAS: ${{ steps.config.outputs.keystore_alias }}
          KEYSTORES_JSON: ${{ secrets.KEYSTORES_JSON }}
        run: |
          REPO="${{ github.repository }}"

          # Try to read keystore from KEYSTORES_JSON secret
          if [ -n "$KEYSTORES_JSON" ]; then
            KEYSTORE_B64=$(echo "$KEYSTORES_JSON" | jq -r --arg c "$CLIENT_ID" '.[$c].b64 // empty')
            KEYSTORE_PASS=$(echo "$KEYSTORES_JSON" | jq -r --arg c "$CLIENT_ID" '.[$c].pass // empty')
          fi

          if [ -z "$KEYSTORE_B64" ]; then
            echo "No keystore found for $CLIENT_ID in KEYSTORES_JSON — auto-generating..."
            KEYSTORE_PASS=$(openssl rand -base64 24 | tr -d '/+=' | head -c 32)
            keytool -genkey -v \
              -keystore client.keystore \
              -alias "$KEYSTORE_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KEYSTORE_PASS" \
              -keypass "$KEYSTORE_PASS" \
              -dname "CN=$CLIENT_ID, OU=Mobile, O=Simy, L=Zurich, ST=ZH, C=CH"
            KEYSTORE_B64=$(base64 -w 0 client.keystore)

            # Merge into KEYSTORES_JSON and update secret
            NEW_JSON=$(echo "${KEYSTORES_JSON:-{}}" | jq \
              --arg c "$CLIENT_ID" --arg b "$KEYSTORE_B64" --arg p "$KEYSTORE_PASS" \
              '.[$c] = {b64: $b, pass: $p}')
            gh secret set KEYSTORES_JSON --body "$NEW_JSON" --repo "$REPO"
            echo "✅ Keystore generated and saved to KEYSTORES_JSON"
          else
            echo "✅ Keystore found in KEYSTORES_JSON for $CLIENT_ID"
            echo "$KEYSTORE_B64" | base64 --decode > client.keystore
          fi

          echo "keystore_b64=$KEYSTORE_B64" >> "$GITHUB_OUTPUT"
          echo "keystore_password=$KEYSTORE_PASS" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: |
          echo "${{ steps.keystore.outputs.keystore_b64 }}" | base64 --decode > client.keystore

      - name: Build signed AAB
        env:
          KEYSTORE_ALIAS: ${{ steps.config.outputs.keystore_alias }}
          KEYSTORE_PASSWORD: ${{ steps.keystore.outputs.keystore_password }}
        run: |
          cd android
          cat >> app/build.gradle << 'EOF'

          android.signingConfigs {
            release {
              storeFile file("../../client.keystore")
              storePassword System.getenv("KEYSTORE_PASSWORD")
              keyAlias System.getenv("KEYSTORE_ALIAS")
              keyPassword System.getenv("KEYSTORE_PASSWORD")
            }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF
          ./gradlew bundleRelease

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          packageName: ${{ steps.config.outputs.bundle_id }}
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: clients/${{ matrix.client }}/whatsnew/
