name: Build White-Label Android App

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client ID (folder name in clients/)'
        required: true
        default: 'driving-team'
      track:
        description: 'Play Store track'
        required: false
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]

  push:
    tags: ['v*']

jobs:
  setup:
    name: Resolve client list
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.resolve.outputs.clients }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve clients to build
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "clients=[\"${{ github.event.inputs.client }}\"]" >> "$GITHUB_OUTPUT"
          else
            CLIENTS=$(find clients -name config.json \
              | xargs -I{} node -e "
                const c = require('{}');
                if (c.tier === 'whitelabel') process.stdout.write(JSON.stringify(c.clientId) + '\n');
              " | jq -Rs 'split("\n") | map(select(length > 0))' )
            echo "clients=$CLIENTS" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    name: Android — ${{ matrix.client }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: ${{ fromJson(needs.setup.outputs.clients) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Load client config
        id: config
        run: |
          CONFIG="clients/${{ matrix.client }}/config.json"
          echo "bundle_id=$(node -e "console.log(require('./$CONFIG').bundleId)")" >> "$GITHUB_OUTPUT"
          echo "app_name=$(node -e "console.log(require('./$CONFIG').appName)")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -e "console.log(require('./$CONFIG').version)")" >> "$GITHUB_OUTPUT"
          echo "keystore_alias=$(node -e "console.log(require('./$CONFIG').android.keystoreAlias)")" >> "$GITHUB_OUTPUT"

      - name: Install npm dependencies
        run: npm ci

      - name: Nuxt static build
        env:
          CLIENT: ${{ matrix.client }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NODE_ENV: production
        run: npx nuxt generate

      - name: Add Android platform (if not present)
        run: |
          CLIENT="${{ matrix.client }}" npx cap add android 2>/dev/null || true
          CLIENT="${{ matrix.client }}" npx cap sync android

      - name: Generate app icons
        env:
          CLIENT: ${{ matrix.client }}
        run: |
          if [ -f "clients/${{ matrix.client }}/icon.png" ]; then
            npm install -D sharp --no-save
            node scripts/generate-icons.mjs
          fi

      - name: Setup keystore (auto-generate if new client)
        id: keystore
        env:
          GH_TOKEN: ${{ secrets.SIMY_GITHUB_PAT }}
          CLIENT_ID: ${{ matrix.client }}
          KEYSTORE_ALIAS: ${{ steps.config.outputs.keystore_alias }}
        run: |
          ALIAS_UPPER=$(echo "$CLIENT_ID" | tr '[:lower:]-' '[:upper:]_')
          SECRET_BASE64="${ALIAS_UPPER}_KEYSTORE_BASE64"
          SECRET_PASS="${ALIAS_UPPER}_KEY_PASSWORD"
          REPO="${{ github.repository }}"

          # Check if keystore secret already exists via GitHub API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/secrets/$SECRET_BASE64")

          if [ "$STATUS" = "404" ]; then
            echo "No keystore found for $CLIENT_ID — auto-generating..."
            KEYSTORE_PASSWORD=$(openssl rand -base64 24 | tr -d '/+=' | head -c 32)
            keytool -genkey -v \
              -keystore client.keystore \
              -alias "$KEYSTORE_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEYSTORE_PASSWORD" \
              -dname "CN=$CLIENT_ID, OU=Mobile, O=Simy, L=Zurich, ST=ZH, C=CH"
            KEYSTORE_B64=$(base64 -w 0 client.keystore)
            gh secret set "$SECRET_BASE64" --body "$KEYSTORE_B64" --repo "$REPO"
            gh secret set "$SECRET_PASS" --body "$KEYSTORE_PASSWORD" --repo "$REPO"
            echo "keystore_b64=$KEYSTORE_B64" >> "$GITHUB_OUTPUT"
            echo "keystore_password=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
            echo "✅ Keystore auto-generated and saved as GitHub Secrets"
          else
            echo "Keystore already exists for $CLIENT_ID — using stored secrets"
            echo "keystore_b64=USE_SECRET" >> "$GITHUB_OUTPUT"
            echo "keystore_password=USE_SECRET" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore
        run: |
          if [ "${{ steps.keystore.outputs.keystore_b64 }}" = "USE_SECRET" ]; then
            echo "${{ secrets.DRIVING_TEAM_KEYSTORE_BASE64 }}" | base64 --decode > client.keystore
          else
            echo "${{ steps.keystore.outputs.keystore_b64 }}" | base64 --decode > client.keystore
          fi

      - name: Build signed AAB
        env:
          KEYSTORE_ALIAS: ${{ steps.config.outputs.keystore_alias }}
          KEYSTORE_PASSWORD: ${{ steps.keystore.outputs.keystore_password == 'USE_SECRET' && secrets.DRIVING_TEAM_KEY_PASSWORD || steps.keystore.outputs.keystore_password }}
        run: |
          cd android
          cat >> app/build.gradle << 'EOF'

          android.signingConfigs {
            release {
              storeFile file("../../client.keystore")
              storePassword System.getenv("KEYSTORE_PASSWORD")
              keyAlias System.getenv("KEYSTORE_ALIAS")
              keyPassword System.getenv("KEYSTORE_PASSWORD")
            }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF
          ./gradlew bundleRelease

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          packageName: ${{ steps.config.outputs.bundle_id }}
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: clients/${{ matrix.client }}/whatsnew/
