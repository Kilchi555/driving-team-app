name: SEO & Ads Monthly Reminder

on:
  schedule:
    # Every 4 weeks on Monday at 08:00 CET (06:00 UTC)
    # Months: Jan 5, Feb 2, Mar 2, Mar 30, Apr 27, May 25, Jun 22, Jul 20, Aug 17, Sep 14, Oct 12, Nov 9, Dec 7
    - cron: '0 6 5 1,3,5,7,9,11 1'   # odd months
    - cron: '0 6 2 2,4,6,8,10,12 1'  # even months
  workflow_dispatch: # allow manual trigger

jobs:
  create-reminder:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%d.%m.%Y')" >> $GITHUB_OUTPUT

      - name: Create SEO & Ads reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = '${{ steps.date.outputs.date }}';
            const nextCheck = new Date();
            nextCheck.setDate(nextCheck.getDate() + 28);
            const nextDate = nextCheck.toLocaleDateString('de-CH');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 SEO & Ads Check — ${today}`,
              labels: ['reminder', 'seo', 'marketing'],
              body: `## Monatlicher SEO & Ads Check

> Erstellt automatisch am **${today}** · Nächster Check ca. **${nextDate}**

---

### 🔍 Google Search Console
- [ ] Leistungsbericht: Klicks & Impressionen vs. Vormonat
- [ ] Neue Keywords mit Position 4–15 identifizieren (Quick-Win-Kandidaten)
- [ ] Coverage-Fehler: keine neuen 404 oder Index-Probleme
- [ ] Core Web Vitals: LCP / CLS / INP Status
- [ ] Sitemap: alle Seiten gecrawlt?

### 📈 Google Ads
- [ ] CTR pro Kampagne prüfen (Ziel: >3%)
- [ ] Suchbegriffsbericht: irrelevante Keywords als negativ hinzufügen
- [ ] Qualitätsfaktor pro Anzeigengruppe (Ziel: ≥7)
- [ ] Budget-Auslastung: wird täglich-Budget voll ausgeschöpft?
- [ ] Conversion-Rate: Kursanmeldungen / Anfragen aus Ads

### 🌐 drivingteam.ch Website
- [ ] Top-5-Seiten nach Impressionen: Titles & Descriptions noch aktuell?
- [ ] Neue Blog-Artikel Ideen basierend auf Suchbegriffen notieren
- [ ] Broken Links prüfen (z.B. mit [Screaming Frog](https://www.screamingfrog.co.uk/))
- [ ] Page Speed auf Mobile testen: [PageSpeed Insights](https://pagespeed.web.dev/?url=https://drivingteam.ch)

### 💡 Schnelle Wins (falls vorhanden)
- [ ] Seiten auf Position 8–15: interne Links stärken oder Title optimieren
- [ ] Saisonale Keywords: z.B. "Nothelferkurs Herbst" oder "Führerschein Frühjahr"
- [ ] Google Business Profil: neue Bewertungen beantwortet?

---

*Automatisch erstellt via GitHub Actions · [Workflow bearbeiten](../../actions/workflows/seo-ads-reminder.yml)*`
            });
