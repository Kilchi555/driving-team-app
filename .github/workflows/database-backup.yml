name: Daily Database Backup

on:
  schedule:
    # Täglich um 02:00 UTC (04:00 MESZ)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Set backup date
        id: date
        run: echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Dump schema (plain SQL – lesbar)
        env:
          PGSSLMODE: require
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --schema-only \
            -f schema.sql
          echo "✅ Schema: $(du -sh schema.sql | cut -f1)"

      - name: Dump full backup (custom format – komprimiert)
        env:
          PGSSLMODE: require
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --format=custom \
            --compress=9 \
            -f backup.dump
          echo "✅ Backup: $(du -sh backup.dump | cut -f1)"

      - name: Install rclone
        run: |
          curl -sSL https://rclone.org/install.sh | sudo bash -s beta 2>/dev/null
          mkdir -p ~/.config/rclone
          printf '[r2]\ntype = s3\nprovider = Cloudflare\naccess_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}\nsecret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}\nendpoint = ${{ secrets.R2_ENDPOINT }}\nno_check_bucket = true\n\n[supabase]\ntype = s3\nprovider = Other\naccess_key_id = ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}\nsecret_access_key = ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}\nendpoint = https://unyjaetebnaexaflpyoc.supabase.co/storage/v1/s3\nregion = auto\nno_check_bucket = true\n' > ~/.config/rclone/rclone.conf

      - name: Upload to Cloudflare R2
        run: |
          DATE=${{ steps.date.outputs.DATE }}
          rclone copyto schema.sql "r2:${{ secrets.R2_BUCKET }}/$DATE/schema.sql"
          rclone copyto backup.dump "r2:${{ secrets.R2_BUCKET }}/$DATE/backup.dump"
          echo "✅ R2 Upload: ${{ secrets.R2_BUCKET }}/$DATE (schema.sql + backup.dump)"

      - name: Sync Supabase Storage → R2
        run: |
          # Inkrementell: nur neue/geänderte Dateien werden übertragen.
          # Erste Ausführung ~700 MB, danach nur Deltas.
          # Ziel: r2:driving-team-backups/storage/<bucket>/...
          if [ -z "${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}" ]; then
            echo "⚠️  SUPABASE_S3_ACCESS_KEY_ID nicht gesetzt – Storage-Backup übersprungen."
            echo "    Bitte in GitHub Secrets hinterlegen (Supabase → Storage → S3 Access Keys)."
            exit 0
          fi
          echo "📂 Starte Storage-Sync..."
          rclone sync supabase: "r2:${{ secrets.R2_BUCKET }}/storage" \
            --transfers=8 \
            --checkers=16 \
            --stats=30s \
            --stats-one-line \
            2>&1 | tail -20
          echo "✅ Storage-Sync abgeschlossen: $(rclone size "r2:${{ secrets.R2_BUCKET }}/storage" --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(round(d.get('bytes',0)/1024/1024,1))+' MB, '+str(d.get('count',0))+' Dateien')" 2>/dev/null || echo 'Grösse unbekannt')"

      - name: GFS Retention – Grandfather-Father-Son
        run: |
          TODAY=$(date +%Y-%m-%d)
          CUTOFF_DAILY=$(date -d '7 days ago' +%Y-%m-%d)
          CUTOFF_WEEKLY=$(date -d '28 days ago' +%Y-%m-%d)
          CUTOFF_MONTHLY=$(date -d '365 days ago' +%Y-%m-%d)

          echo "🗂️  GFS Retention:"
          echo "   Täglich behalten: >= $CUTOFF_DAILY"
          echo "   Wöchentlich (Mo): >= $CUTOFF_WEEKLY"
          echo "   Monatlich (1.):   >= $CUTOFF_MONTHLY"
          echo "   Jährlich (1.1.):  immer"

          rclone lsf "r2:${{ secrets.R2_BUCKET }}" --dirs-only | sort | while read folder; do
            folder="${folder%/}"
            if ! [[ "$folder" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then continue; fi

            DAY="${folder:8:2}"
            MONTH="${folder:5:2}"
            DOW=$(date -d "$folder" +%u 2>/dev/null) # 1=Montag

            KEEP=false

            # Täglich: letzte 7 Tage
            if [[ "$folder" > "$CUTOFF_DAILY" ]] || [[ "$folder" == "$CUTOFF_DAILY" ]]; then
              KEEP=true
            # Wöchentlich: Montage der letzten 4 Wochen
            elif [[ "$folder" > "$CUTOFF_WEEKLY" ]] && [[ "$DOW" == "1" ]]; then
              KEEP=true
            # Monatlich: 1. des Monats der letzten 12 Monate
            elif [[ "$folder" > "$CUTOFF_MONTHLY" ]] && [[ "$DAY" == "01" ]]; then
              KEEP=true
            # Jährlich: 1. Januar – für immer (DSG/DSGVO Compliance)
            elif [[ "$MONTH" == "01" ]] && [[ "$DAY" == "01" ]]; then
              KEEP=true
            fi

            if [[ "$KEEP" == "false" ]]; then
              rclone purge "r2:${{ secrets.R2_BUCKET }}/$folder"
              echo "🗑️  Gelöscht: $folder"
            else
              echo "✅ Behalten: $folder"
            fi
          done

      - name: Summary
        run: |
          DATE=${{ steps.date.outputs.DATE }}
          echo "🎉 Backup abgeschlossen!"
          echo "   Datum:    $DATE"
          echo "   Schema:   $(du -sh schema.sql | cut -f1)"
          echo "   Backup:   $(du -sh backup.dump | cut -f1)"
          echo "   DB:       r2:${{ secrets.R2_BUCKET }}/$DATE"
          echo "   Storage:  r2:${{ secrets.R2_BUCKET }}/storage/ (inkrementell)"
